<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HTML 바로가기</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --panel: #2d2d2d;
      --card: #2d2d2d;
      --accent: #e8e8e8;
      --text: #e8e8e8;
      --muted: #a0a0a0;
      --stone: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      padding: 32px 20px 40px;
      position: relative;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0, rgba(255, 255, 255, 0.03) 1px, transparent 1px, transparent 40px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.01) 0, rgba(255, 255, 255, 0.01) 1px, transparent 1px, transparent 80px);
      opacity: 0.25;
      pointer-events: none;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--panel);
      border-radius: 28px;
      padding: 36px;
      border: 1px solid var(--stone);
      position: relative;
      isolation: isolate;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--stone);
      padding: 20px;
      text-decoration: none;
      color: inherit;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      min-height: 140px;
      transition: transform 200ms ease, border-color 200ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .name {
      font-weight: 600;
      font-size: 18px;
    }

    .path {
      font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
    }

    .cta {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
    }

  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>HTML 바로가기</h1>
      <div class="sub">CSS Grid로 만든 로컬 링크 모음</div>
    </header>

    <section class="grid">
      <a class="card" href="calendar.html" target="_blank" rel="noopener">
        <div class="name">calendar.html</div>
        <div class="path">./calendar.html</div>
        <div class="cta">열기 →</div>
      </a>
      <a class="card" href="TextDecoder.html" target="_blank" rel="noopener">
        <div class="name">TextDecoder.html</div>
        <div class="path">./TextDecoder.html</div>
        <div class="cta">열기 →</div>
      </a>
      <a class="card" href="memo.html" target="_blank" rel="noopener">
        <div class="name">memo.html</div>
        <div class="path">./memo.html</div>
        <div class="cta">열기 →</div>
      </a>
      <a class="card" href="parser copy.html" target="_blank" rel="noopener">
        <div class="name">parser copy.html</div>
        <div class="path">./parser copy.html</div>
        <div class="cta">열기 →</div>
      </a>
      <a class="card" href="parser.html" target="_blank" rel="noopener">
        <div class="name">parser.html</div>
        <div class="path">./parser.html</div>
        <div class="cta">열기 →</div>
      </a>
      <a class="card" href="sql-param-converter.html" target="_blank" rel="noopener">
        <div class="name">sql-param-converter.html</div>
        <div class="path">./sql-param-converter.html</div>
        <div class="cta">열기 →</div>
      </a>
    </section>
 
  </div>
</body>
</html>
